<!-- Redesigned Trainee Registration Form Content (Split Layout - 2 Steps with OTP) -->
<section class="w-full flex items-center justify-center py-6 px-6 sm:px-10 bg-[#F9F6EF]/50 min-h-[calc(100vh-114px)] overscroll-none">
    <div class="max-w-[1200px] w-full flex flex-col lg:flex-row items-center lg:items-start justify-center gap-8 lg:gap-20">
        
        <!-- Left Side: Branding & Title -->
        <div class="flex flex-col items-center lg:items-start text-center lg:text-left gap-4 lg:w-[32%] shrink-0 py-4">
            <h1 class="font-['Cormorant_Garamond',serif] text-[#1b3a28] text-[42px] sm:text-[52px] lg:text-[68px] leading-[1.05] tracking-tight">
                Trainee <br class="hidden lg:block">Registration
            </h1>
            
            <!-- Decorative SVG line -->
            <svg xmlns="http://www.w3.org/2000/svg" width="222" height="31" viewBox="0 0 222 31" fill="none"
                class="w-[160px] sm:w-[200px] lg:w-[222px] h-auto">
                <path d="M114.309 14.8098V23.2947C114.309 23.2947 117.242 22.1091 123.1 22.1091H160.468C166.329 22.1091 169.258 23.2947 169.258 23.2947V14.8098C169.258 14.8098 166.329 15.9953 160.468 15.9953H123.1C117.243 15.9954 114.309 14.8098 114.309 14.8098Z" fill="#218D00" />
                <path d="M184.633 22.109H222V15.9953H184.633C178.771 15.9953 175.838 14.8098 175.838 14.8098V23.2947C175.838 23.2947 178.771 22.109 184.633 22.109Z" fill="#218D00" />

                <path d="M61.5555 22.1091H98.9187C104.78 22.1091 107.709 23.2947 107.709 23.2947V14.8098C107.709 14.8098 104.78 15.9953 98.9187 15.9953H61.5555C55.6904 15.9953 52.7614 14.8098 52.7614 14.8098V23.2947C52.7614 23.2947 55.69 22.1091 61.5555 22.1091Z" fill="#218D00" />
                <path d="M156.281 9.16582L162.631 6.8146C166.066 5.54098 171.174 3.42571 168.946 1.13586C158.783 1.78677 152.79 3.78594 149.355 5.05946L143.009 7.41078C139.574 8.68264 134.463 10.7997 136.694 13.0878C146.853 12.4385 152.85 10.4393 156.281 9.16582Z" fill="#C9A700" />
                <path d="M165.524 9.95625C160.938 10.3929 153.677 11.175 150.509 12.7724C157.923 13.3618 165.483 12.7358 170.069 12.2991L178.538 11.4938C183.127 11.0587 190.385 10.275 193.557 8.67931C186.143 8.08822 178.582 8.71414 173.992 9.15088L165.524 9.95625Z" fill="#C9A700" />
                <path d="M136.14 6.06893L135.326 4.03659C134.887 2.93567 133.796 1.1656 127.935 0C123.086 1.3749 123.412 3.1598 123.855 4.26237L124.665 6.29316C125.1 7.39407 126.195 9.1657 132.056 10.3314C136.905 8.9565 136.578 7.16985 136.14 6.06893Z" fill="#C9A700" />
                <path d="M76.0028 27.5093C78.6658 28.1103 83.1771 29.0386 89.1812 29.0983C89.0388 27.7682 84.9434 26.7504 82.2808 26.1477L77.3603 25.0351C74.6977 24.4341 70.1865 23.5059 64.1824 23.4462C64.3247 24.7762 68.4202 25.794 71.0827 26.3968L76.0028 27.5093Z" fill="#C9A700" />
                <path d="M68.5446 28.5525L67.772 27.4051C67.3519 26.784 66.4594 25.7878 62.9568 25.1718C60.4141 25.9871 60.8791 26.9983 61.2954 27.6193L62.0718 28.765C62.4918 29.3876 63.3843 30.3822 66.887 31C69.4259 30.1831 68.9646 29.1735 68.5446 28.5525Z" fill="#C9A700" />
                <path d="M82.7847 22.9617C79.9873 22.857 75.4348 22.7342 71.692 23.2788C74.4032 24.0659 78.8845 24.285 81.6787 24.3913L86.8427 24.5856C89.6401 24.6918 94.193 24.8148 97.9321 24.27C95.2204 23.4813 90.7391 23.2639 87.945 23.1576L82.7847 22.9617Z" fill="#C9A700" />
            </svg>
            
            <p class="font-['Inter'] text-[#464e42] text-[16px] max-w-[340px] opacity-75 mt-2 hidden md:block">
                Fill out the details below to enroll in our specialized training and incubation programs.
            </p>
        </div>

        <!-- Right Side: Compact Form Card -->
        <div class="w-full lg:max-w-[720px]">
            <div class="bg-white rounded-[18px] shadow-[0px_4px_30px_rgba(0,0,0,0.03)] border border-gray-100 min-h-[500px] flex flex-col relative overflow-hidden">
                
                <!-- Stepper Progress Bar -->
                <div class="w-full h-1.5 bg-gray-50 flex">
                    <div id="step-progress" class="h-full bg-[#2d5a3d] transition-all duration-500 w-1/2"></div>
                </div>

                <form id="traniee-form" class="flex flex-col flex-grow p-6 sm:p-8 lg:p-10 gap-6">
                    
                    <!-- STEP 1: MAIN FORM -->
                    <div id="step-1" class="step-container space-y-4 flex flex-col gap-5 animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                        <!-- Full Name -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Full Name</label>
                            <input type="text" placeholder="Enter your full name" 
                                class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                        </div>

                        <!-- Phone Number -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Phone Number</label>
                            <input type="tel" placeholder="+91 0000000000" 
                                class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                        </div>

                        <!-- Email Address -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Email Address</label>
                            <input type="email" placeholder="email@example.com" 
                                class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                        </div>

                        <!-- State Region -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">State / Region</label>
                            <div class="relative">
                                <select class="appearance-none bg-[#F7F8F9] border-none rounded-[10px] p-3.5 w-full font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28]">
                                    <option value="">Select State</option>
                                    <option value="Assam">Assam</option>
                                    <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                    <option value="Manipur">Manipur</option>
                                    <option value="Meghalaya">Meghalaya</option>
                                    <option value="Mizoram">Mizoram</option>
                                    <option value="Nagaland">Nagaland</option>
                                    <option value="Sikkim">Sikkim</option>
                                    <option value="Tripura">Tripura</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-[#1b3a28]">
                                    <svg class="h-4 w-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Date of Birth -->
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Date of Birth</label>
                            <input type="text" placeholder="DD/MM/YYYY" 
                                class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                        </div>
                    </div>

                    <!-- Complete Address (Condensed) -->
                    <div class="flex flex-col gap-1.5">
                        <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Complete Full Address</label>
                        <textarea placeholder="Enter your full permanent address" rows="2"
                            class="bg-[#F7F8F9] border-none rounded-[10px] p-4 font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0] resize-none"></textarea>
                    </div>

                    <!-- Password Fields -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Create Password</label>
                            <div class="relative">
                                <input type="password" id="tr-password" placeholder="Min. 8 characters" 
                                    class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 w-full font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                                <button type="button" onclick="toggleRegPassword('tr-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#2d5a3d]">
                                    <i class="far fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label class="font-['Inter'] font-semibold text-[#131927] text-[14px]">Confirm Password</label>
                            <div class="relative">
                                <input type="password" id="tr-confirm-password" placeholder="Re-enter password" 
                                    class="bg-[#F7F8F9] border-none rounded-[10px] p-3.5 w-full font-['Inter'] text-[15px] outline-none focus:ring-2 focus:ring-[#2d5a3d]/20 transition-all text-[#1b3a28] placeholder:text-[#ADBEB0]">
                                <button type="button" onclick="toggleRegPassword('tr-confirm-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#2d5a3d]">
                                    <i class="far fa-eye text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    </div>

                    <!-- STEP 2: OTP VERIFICATION -->
                    <div id="step-2" class="step-container space-y-6 hidden animate-fadeIn flex-col items-center justify-center">
                        <div class="w-16 h-16 bg-[#f1ffee] text-[#2d5a3d] rounded-full flex items-center justify-center mb-6">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                        
                        <h3 class="font-['Manrope'] font-bold text-[24px] text-[#1b3a28] text-center mb-2">Verify Identity</h3>
                        <p class="font-['Inter'] text-[#677461] text-[15px] text-center mb-8 px-4 opacity-75">
                            An OTP has been sent to your mobile number. Please enter the 6-digit code to confirm your registration.
                        </p>

                        <!-- OTP Input Grid -->
                        <div class="flex justify-between gap-2 mb-8" id="traniee-otp-inputs">
                            <input type="text" maxlength="1" class="otp-box" />
                            <input type="text" maxlength="1" class="otp-box" />
                            <input type="text" maxlength="1" class="otp-box" />
                            <input type="text" maxlength="1" class="otp-box" />
                            <input type="text" maxlength="1" class="otp-box" />
                            <input type="text" maxlength="1" class="otp-box" />
                        </div>
                        
                        <p class="text-center text-sm font-['Inter'] text-[#677461]">
                            Didn't receive it? <button type="button" id="resend-otp-btn" onclick="resendOTP()" class="text-[#2d5a3d] font-bold hover:underline disabled:opacity-50 disabled:cursor-not-allowed">Resend OTP</button>
                        </p>
                    </div>

                    <!-- REUSABLE ACTIONS -->
                    <div class="mt-auto pt-8 flex gap-4">
                        <button id="prev-btn" type="button" class="hidden px-8 py-3.5 border border-[#2d5a3d] text-[#2d5a3d] font-bold rounded-[12px] hover:bg-gray-50 transition-all active:scale-[0.98]">
                            Back
                        </button>
                        <button id="next-btn" type="button" class="flex-grow bg-[#2d5a3d] hover:bg-[#1b3a28] text-white font-bold py-3.5 rounded-[12px] shadow-lg shadow-[#2d5a3d]/15 transition-all hover:-translate-y-0.5 active:translate-y-0">
                            Get OTP
                        </button>
                        <button id="submit-btn" type="submit" class="hidden w-full flex-grow bg-[#2d5a3d] hover:bg-[#1b3a28] text-white font-bold py-3.5 rounded-[12px] shadow-lg shadow-[#2d5a3d]/15 transition-all hover:-translate-y-0.5 active:translate-y-0">
                            Verify & Register
                        </button>
                    </div>
                </form>
            </div>
        </div>
        
    </div>

    <style>
        .otp-box {
            width: 3.5rem;
            height: 4rem;
            background-color: #F7F8F9;
            border: 2px solid #F1F2F4;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            color: #1b3a28;
        }
        .otp-box:focus {
            border-color: #2d5a3d;
            box-shadow: 0 0 0 4px rgba(45, 90, 61, 0.1);
        }
    </style>

    <script>
        (function() {
            let currentStep = 1;
            const totalSteps = 2;
            const nextBtn = document.getElementById('next-btn');
            const prevBtn = document.getElementById('prev-btn');
            const submitBtn = document.getElementById('submit-btn');
            const progress = document.getElementById('step-progress');
            const otpInputs = document.querySelectorAll('#traniee-otp-inputs input');

            function updateUI() {
                // Update Step Visibility
                document.querySelectorAll('.step-container').forEach(el => el.classList.add('hidden'));
                document.getElementById(`step-${currentStep}`).classList.remove('hidden');
                
                // Special handling for Step 2 (OTP) layout
                if (currentStep === 2) {
                    document.getElementById(`step-2`).classList.add('flex');
                    if (otpInputs[0]) otpInputs[0].focus();
                    startResendTimer();
                } else {
                    document.getElementById(`step-2`).classList.remove('flex');
                }

                // Update Progress Bar
                progress.style.width = `${(currentStep / totalSteps) * 100}%`;

                // Update Buttons
                if (currentStep === 1) {
                    prevBtn.classList.add('hidden');
                    nextBtn.classList.remove('hidden');
                    submitBtn.classList.add('hidden');
                    nextBtn.innerText = "Get OTP";
                } else if (currentStep === 2) {
                    prevBtn.classList.remove('hidden');
                    nextBtn.classList.add('hidden');
                    submitBtn.classList.remove('hidden');
                }
            }

            nextBtn.addEventListener('click', () => {
                if (currentStep < totalSteps) {
                    currentStep++;
                    updateUI();
                }
            });

            prevBtn.addEventListener('click', () => {
                if (currentStep > 1) {
                    currentStep--;
                    updateUI();
                }
            });

            updateUI();

            otpInputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length > 0 && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                        otpInputs[index - 1].focus();
                    }
                });
            });

            window.verifyAndSubmit = function() {
                let otp = "";
                otpInputs.forEach(input => otp += input.value);
                if (otp.length < 6) {
                    alert('Please enter all 6 digits of the OTP.');
                    return;
                }
                alert('Trainee Registered Successfully!');
            };

            window.toggleRegPassword = function(id) {
                const input = document.getElementById(id);
                const icon = input.nextElementSibling.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            };

            // Timer Logic
            let resendTimer = 30;
            let timerInterval;

            window.startResendTimer = function() {
                const resendBtn = document.getElementById('resend-otp-btn');
                if (!resendBtn) return;
                
                resendBtn.disabled = true;
                resendTimer = 30;
                
                if (timerInterval) clearInterval(timerInterval);
                
                timerInterval = setInterval(() => {
                    resendTimer--;
                    resendBtn.innerText = `Resend OTP in ${resendTimer}s`;
                    
                    if (resendTimer <= 0) {
                        clearInterval(timerInterval);
                        resendBtn.innerText = "Resend OTP";
                        resendBtn.disabled = false;
                    }
                }, 1000);
            };

            window.resendOTP = function() {
                // Simulate resend
                console.log("OTP Resent");
                startResendTimer();
            };
        })();
    </script>
</section>
