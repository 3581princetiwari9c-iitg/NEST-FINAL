  class="w-full flex flex-col items-center pt-5 sm:pt-8 lg:pt-[16px] pb-12 sm:pb-16 lg:pb-[72px] px-4 sm:px-6 lg:px-[88px] relative z-10">
  <div class="max-w-[1073px] w-full flex flex-col items-center gap-[14px] sm:gap-[24px]">
    <!-- PAGE HEADER -->
    <div id="components-page-header-container" class="w-full">
      <div class="w-full flex flex-col gap-[42px] items-center text-center">
        <div class="flex flex-col gap-[12px] items-center">
          <span class="font-['Inter',sans-serif] font-normal text-[#887103] text-[15px] sm:text-[18px]">
            PROGRAM
          </span>
          <div class="flex flex-col gap-[3px] sm:gap-[7px] items-center">
            <h1 class="font-['Cormorant_Garamond',serif] text-[#1b3a28] text-[36px] md:text-[52px] leading-tight">
              Program/Course
            </h1>

            <svg xmlns="http://www.w3.org/2000/svg" width="222" height="31" viewBox="0 0 222 31" fill="none"

          </div>
          <p class="hidden"></p>
        </div>
      </div>
    </div>

    <!-- FILTER / TAB SECTION -->
    <div class="w-full flex flex-col gap-[16px] items-center relative z-10 w-full max-w-[1073px]">
      <div class="w-full flex items-center justify-between relative shrink-0">
        <!-- TABS -->
        <div class="flex gap-[16px] items-center overflow-x-auto w-full md:w-auto scrollbar-hide">
          <button
            id="tab-upcoming"
            onclick="switchProgramTab('upcoming')"
            class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
            <div class="flex gap-[14px] items-center justify-center relative shrink-0">
              <svg class="tab-icon w-5 h-5 text-[#677461]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
              </svg>
              <div class="flex gap-[22px] items-center justify-center relative shrink-0">
                <span class="tab-text font-['Inter'] font-normal text-[#677461] text-[16px]">Upcoming</span>
                <span
                  class="bg-[#d8d8d8] text-[#677461] font-['Manrope'] font-normal text-[16px] px-[10px] py-[2px] rounded-[50px]">0</span>
              </div>
            </div>
            <div class="tab-indicator w-full h-[2px] bg-transparent"></div>
          </button>

          <button
            id="tab-ongoing"
            onclick="switchProgramTab('ongoing')"
            class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
            <div class="flex gap-[14px] items-center justify-center relative shrink-0">
              <svg class="tab-icon w-5 h-5 text-[#677461]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                </path>
              </svg>
              <div class="flex gap-[22px] items-center justify-center relative shrink-0">
                <span class="tab-text font-['Inter'] font-normal text-[#677461] text-[16px]">Ongoing</span>
                <span
                  class="bg-[#d8d8d8] text-[#677461] font-['Manrope'] font-normal text-[16px] px-[10px] py-[2px] rounded-[50px]">0</span>
              </div>
            </div>
            <div class="tab-indicator w-full h-[2px] bg-transparent"></div>
          </button>

          <button
            id="tab-completed"
            onclick="switchProgramTab('completed')"
            class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
            <div class="flex gap-[14px] items-center justify-center relative shrink-0">
              <svg class="tab-icon w-5 h-5 text-[#2d5a3d]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              <div class="flex gap-[22px] items-center justify-center relative shrink-0">
                <span class="tab-text font-['Inter'] font-semibold text-[#2d5a3d] text-[16px]">Completed</span>
                <span
                  class="bg-[#d8d8d8] text-[#2d5a3d] font-['Manrope'] font-semibold text-[16px] px-[10px] py-[2px] rounded-[50px]">0</span>
              </div>
            </div>
            <div class="tab-indicator w-full h-[2px] bg-[#2d5a3d]"></div>
          </button>
        </div>

        <!-- Filter Action -->
        <button
          class="block cursor-pointer overflow-clip relative shrink-0 w-[48px] h-[48px] rounded-full hover:bg-gray-50 transition-colors"
          onclick="
            document
              .getElementById('secondary-filters')
              .classList.toggle('hidden')
          ">
          <div class="absolute inset-[24.68%_20.94%_24.68%_21.19%] text-[#1b3a28]">
            <svg class="block max-w-none w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4">
              </path>
            </svg>
          </div>
        </button>
      </div>

      <!-- Secondary Filters Bar -->
      <div id="secondary-filters"
        class="hidden w-full flex flex-wrap gap-[16px] items-center justify-center relative shrink-0 mt-2">
        <label
          class="bg-white flex gap-[8px] items-center justify-center px-[16px] py-[10px] relative rounded-[25px] shrink-0 border border-[#f3f4f6]">
          <span class="font-['Inter'] font-normal text-[#2d5a3d] text-[16px] text-center">Vertical:</span>
          <select id="program-filter-vertical"
            class="bg-transparent border-0 outline-none cursor-pointer font-['Inter'] font-semibold text-[#2d5a3d] text-[15px] max-w-[260px]">
            <option value="">All</option>
            <option value="Innovation Hub on Grassroots Technologies">Innovation Hub on Grassroots Technologies</option>
            <option value="Technology Hub for Semiconductor & Artificial Intelligence">Technology Hub for Semiconductor & Artificial Intelligence</option>
            <option value="CoE for Bamboo Innovation & Skill Development">CoE for Bamboo Innovation & Skill Development</option>
            <option value="Centre on Biodegradable, eco-friendly Plastics & Solid-Waste Management">Centre on Biodegradable, eco-friendly Plastics & Solid-Waste Management</option>
          </select>
        </label>
        <label
          class="bg-white flex gap-[8px] items-center justify-center px-[16px] py-[10px] relative rounded-[25px] shrink-0 border border-[#f3f4f6]">
          <span class="font-['Inter'] font-normal text-[#2d5a3d] text-[16px] text-center">Programme Type:</span>
          <select id="program-filter-type"
            class="bg-transparent border-0 outline-none cursor-pointer font-['Inter'] font-semibold text-[#2d5a3d] text-[15px]">
            <option value="">All</option>
            <option value="STP">STP</option>
            <option value="LTP">LTP</option>
            <option value="Workshop">Workshop</option>
            <option value="Technology Development">Technology Development</option>
          </select>
        </label>
        <label
          class="bg-white flex gap-[8px] items-center justify-center px-[16px] py-[10px] relative rounded-[25px] shrink-0 border border-[#f3f4f6]">
          <span class="font-['Inter'] font-normal text-[#2d5a3d] text-[16px] text-center">Category:</span>
          <select id="program-filter-category"
            class="bg-transparent border-0 outline-none cursor-pointer font-['Inter'] font-semibold text-[#2d5a3d] text-[15px]">
            <option value="">All</option>
          </select>
        </label>
      </div>
    </div>

    <!-- PROGRAM LISTINGS -->
    <!-- UPCOMING LIST -->
    <div id="upcoming-list" class="hidden w-full flex flex-col gap-[36px] items-center mt-2">
      <div class="w-full text-center py-16 text-[#677461] font-['Inter']">Loading upcoming programs...</div>
    </div>

    <!-- ONGOING LIST -->
    <div id="ongoing-list" class="hidden w-full flex flex-col gap-[36px] items-center mt-2">
      <div class="w-full text-center py-16 text-[#677461] font-['Inter']">Loading ongoing programs...</div>
    </div>

    <!-- COMPLETED LIST -->
    <div id="completed-list" class="hidden w-full flex flex-col gap-[36px] items-center mt-2">
      <div class="w-full text-center py-16 text-[#677461] font-['Inter']">Loading completed programs...</div>
    </div>
  </div>
</section>
