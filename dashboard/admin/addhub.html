<div class="flex flex-col gap-[32px] items-start w-full max-w-[1100px] mx-auto pb-10">
    <!-- Top Navigation & Header -->
    <div class="flex flex-col gap-[12px] w-full">
        <div class="flex items-center justify-between w-full">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Add Hub Node
            </h1>
        </div>
    </div>

    <!-- Section: Form -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-[48px] w-full pt-2">
        <div class="flex flex-col gap-[12px]">
            <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">
                Hub Identity
            </h2>
            <p class="font-['Inter'] text-[#677461] text-[14px] leading-relaxed max-w-[280px]">
                Enter the name of the new node to append it to the specific category on the Spoke Network frontend.
            </p>
        </div>

        <div class="bg-white rounded-[16px] shadow-[0px_8px_24px_rgba(0,0,0,0.04)] border border-gray-100 p-[32px] w-full">
            <form id="add-hub-form" class="flex flex-col gap-[24px]">
                <div class="flex flex-col gap-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase">Node Name</label>
                    <input type="text" id="hub-name" required placeholder="e.g. Agartala" class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase">Category</label>
                    <div class="relative group">
                        <select id="hub-category" required class="appearance-none w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all cursor-pointer">
                            <option value="State Universities">State Universities</option>
                            <option value="NIT Network">NIT Network</option>
                            <option value="Industry Partner">Industry Partner</option>
                            <option value="Government Bodies">Government Bodies</option>
                        </select>
                        <div class="absolute right-[16px] top-1/2 -translate-y-1/2 pointer-events-none text-[#677461]">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                    </div>
                </div>
                <button type="submit" class="bg-[#2D5A3D] hover:bg-[#1b3a28] text-white px-8 py-3 mt-4 rounded-[8px] font-['Manrope'] font-bold text-[15px] shadow-sm transition-all text-center w-full md:w-auto self-start">
                    Add Node
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    (function() {
        const form = document.getElementById('add-hub-form');
        if (form) {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('hub-name').value.trim();
                const category = document.getElementById('hub-category').value;
                if (!name) return;
                
                let hubs = JSON.parse(localStorage.getItem('hubsNetwork') || '[]');
                hubs.push({ name: name, category: category });
                localStorage.setItem('hubsNetwork', JSON.stringify(hubs));
                
                alert('Hub Node added successfully!');
                form.reset();
            });
        }
    })();
</script>
