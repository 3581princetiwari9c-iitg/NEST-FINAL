<div class="flex flex-col gap-[32px] items-start w-full max-w-[1100px] mx-auto pb-10">
    <!-- Top Navigation & Header -->
    <div class="flex flex-col gap-[12px] w-full">
        <a href="#newsletter"
            class="flex items-center gap-2 text-[#677461] hover:text-[#1b3a28] transition-all font-['Inter'] font-semibold text-[14px] group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Newsletters
        </a>
        <div class="flex items-center justify-between w-full">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Upload Newsletter
            </h1>
            <button
                class="bg-[#2D5A3D] text-white px-8 py-3 rounded-[8px] font-['Manrope'] font-bold text-[15px] shadow-sm hover:bg-[#1b3a28] transition-all">
                Upload
            </button>
        </div>
    </div>

    <!-- Content Section -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-[48px] w-full">
        <!-- Left Column: Info -->
        <div class="flex flex-col gap-[12px]">
            <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">
                Details
            </h2>
            <p class="font-['Inter'] text-[#677461] text-[14px] leading-relaxed max-w-[280px]">
                Upload the details of Newsletter
            </p>
        </div>

        <!-- Right Column: Form Card -->
        <div
            class="bg-white rounded-[16px] shadow-[0px_8px_24px_rgba(0,0,0,0.04)] border border-gray-100 p-[32px] w-full">
            <form class="flex flex-col gap-[24px]">
                <!-- Edition Name -->
                <div class="flex flex-col gap-2">
                    <div class="flex items-center justify-between w-full">
                        <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Edition Name</label>
                        <span class="font-['Inter'] font-bold text-[#D14D41] text-[10px] uppercase">MAX : 3 WORDS</span>
                    </div>
                    <input type="text" placeholder="e.g. Northeast Innovation Summit 2024"
                        class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all">
                </div>

                <!-- Three Column Row: Month, Year, Date -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-[20px]">
                    <!-- Month -->
                    <div class="flex flex-col gap-2">
                        <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Month</label>
                        <div class="relative group">
                            <select
                                class="appearance-none w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all cursor-pointer">
                                <option value="" disabled selected>Select Month</option>
                                <option value="january">January</option>
                                <option value="february">February</option>
                                <option value="march">March</option>
                                <option value="april">April</option>
                                <option value="may">May</option>
                                <option value="june">June</option>
                                <option value="july">July</option>
                                <option value="august">August</option>
                                <option value="september">September</option>
                                <option value="october">October</option>
                                <option value="november">November</option>
                                <option value="december">December</option>
                            </select>
                            <div class="absolute right-[16px] top-1/2 -translate-y-1/2 pointer-events-none text-[#677461]">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Year -->
                    <div class="flex flex-col gap-2">
                        <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Year</label>
                        <input type="text" placeholder="2026"
                            class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all">
                    </div>

                    <!-- Date -->
                    <div class="flex flex-col gap-2">
                        <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Date</label>
                        <input type="text" placeholder="12/12/2023" onfocus="(this.type='date')"
                            class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] transition-all">
                    </div>
                </div>

                <!-- PDF Upload -->
                <div class="flex flex-col gap-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">PDF</label>
                    <div
                        class="w-full border-2 border-dashed border-gray-200 rounded-[12px] p-[60px] flex flex-col items-center justify-center gap-4 hover:border-[#2D5A3D] hover:bg-[#f1ffee]/30 transition-all cursor-pointer group">
                        <div
                            class="w-[56px] h-[56px] bg-white rounded-full shadow-sm flex items-center justify-center text-[#2D5A3D] group-hover:scale-110 transition-transform">
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <div class="flex flex-col items-center gap-1 text-center">
                            <span class="font-['Inter'] font-semibold text-[#1b3a28] text-[15px]">Click to upload or drag and drop</span>
                            <span class="font-['Inter'] text-[#677461] text-[13px]">Less than 25mb</span>
                        </div>
                        <input type="file" class="hidden" accept=".pdf">
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Final Action Button -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-[48px] w-full pt-[24px]">
        <div class="hidden lg:block"></div>
        <div class="flex justify-start">
            <button id="upload-newsletter-btn" class="w-full bg-[#2D5A3D] hover:bg-[#1b3a28] text-white font-['Manrope'] font-bold py-[18px] rounded-[12px] shadow-[0px_8px_24px_rgba(45,90,61,0.15)] transition-all duration-300 transform hover:scale-[1.005] active:scale-[0.995] text-[16px] tracking-wider">
                Upload
            </button>
        </div>
    </div>
</div>

<!-- Success Popup Modal -->
<div id="success-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity"></div>
    <div class="relative bg-white rounded-[24px] shadow-2xl p-[40px] w-full max-w-[440px] flex flex-col items-center text-center gap-[24px] transform transition-all duration-300 scale-95 opacity-0" id="modal-content">
        <div class="w-[80px] h-[80px] bg-[#E9F3EC] rounded-full flex items-center justify-center">
            <div class="w-[48px] h-[48px] bg-[#2D5A3D] rounded-full flex items-center justify-center shadow-md">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>
        <div class="flex flex-col gap-[8px]">
            <h3 class="font-['Manrope'] font-bold text-[#1b3a28] text-[24px]">Newsletter Uploaded!</h3>
            <p class="font-['Inter'] text-[#677461] text-[15px] leading-relaxed">
                Your newsletter has been successfully uploaded and is now available for the cluster.
            </p>
        </div>
        <button id="close-modal-btn" class="w-full bg-[#2D5A3D] hover:bg-[#1b3a28] text-white font-['Manrope'] font-bold py-[16px] rounded-[12px] transition-all duration-300 shadow-sm">
            Back to Dashboard
        </button>
    </div>
</div>

<script>
    (function() {
        const uploadBtn = document.getElementById('upload-newsletter-btn');
        const modal = document.getElementById('success-modal');
        const modalContent = document.getElementById('modal-content');
        const closeBtn = document.getElementById('close-modal-btn');

        uploadBtn.addEventListener('click', () => {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        });

        closeBtn.addEventListener('click', () => {
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                window.location.hash = '#newsletter';
            }, 300);
        });
    })();
</script>
