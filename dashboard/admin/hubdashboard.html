<div class="flex flex-col gap-[24px] items-start w-full">
    <!-- Header with Actions -->
    <div class="flex items-center justify-between w-full">
        <div class="flex flex-col gap-1">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Hub Management
            </h1>
        </div>
        <div class="flex items-center gap-3">
            <a href="#add-hub" class="bg-[#2D5A3D] text-white px-6 py-2.5 rounded-[10px] font-['Manrope'] font-bold text-[14px] shadow-sm hover:bg-[#1b3a28] transition-all flex items-center gap-2">
                <i class="fas fa-plus"></i> Add Hub Node
            </a>
        </div>
    </div>

    <!-- Hub List Table -->
    <div class="w-full bg-white rounded-[12px] shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-gray-100 overflow-hidden mb-[72px]">
        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-[#f9fafb] border-b border-gray-100">
                        <th class="px-[24px] py-[16px] text-left font-['Inter'] font-semibold text-[#677461] text-[12px] uppercase tracking-wider whitespace-nowrap w-[50%]">
                            NODE NAME</th>
                        <th class="px-[24px] py-[16px] text-left font-['Inter'] font-semibold text-[#677461] text-[12px] uppercase tracking-wider whitespace-nowrap">
                            CATEGORY</th>
                        <th class="px-[24px] py-[16px] text-right font-['Inter'] font-semibold text-[#677461] text-[12px] uppercase tracking-wider whitespace-nowrap">
                            ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="hub-nodes-list" class="divide-y divide-gray-50">
                    <!-- Dynamic Rows populated by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    (function() {
        const renderHubList = () => {
            const tableBody = document.getElementById('hub-nodes-list');
            if (!tableBody) return;
            
            let hubs = JSON.parse(localStorage.getItem('hubsNetwork') || '[]');
            
            if (hubs.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="3" class="px-[24px] py-[40px] text-center font-['Inter'] text-[#677461] text-[14px]">
                            No hub nodes found. Click "Add Hub Node" to add one.
                        </td>
                    </tr>
                `;
                return;
            }

            tableBody.innerHTML = hubs.map((hub, index) => `
                <tr class="hover:bg-gray-50 transition-all group">
                    <td class="px-[24px] py-[20px]">
                        <span class="font-['Manrope'] font-bold text-[#1b3a28] text-[16px] leading-tight break-words">${hub.name}</span>
                    </td>
                    <td class="px-[24px] py-[20px]">
                        <div class="bg-[#f1ffee] text-[#2D5A3D] px-[12px] py-[4px] rounded-[12px] inline-block font-['Inter'] font-semibold text-[11px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-[#2D5A3D]/10">
                            ${hub.category}
                        </div>
                    </td>
                    <td class="px-[24px] py-[20px] text-right">
                        <button onclick="window.removeHubNode(${index})" class="text-gray-400 hover:text-red-600 transition-all p-2 rounded-lg hover:bg-red-50">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </td>
                </tr>
            `).join('');
        };

        window.removeHubNode = (index) => {
            if(confirm("Are you sure you want to remove this hub node?")) {
                let hubs = JSON.parse(localStorage.getItem('hubsNetwork') || '[]');
                hubs.splice(index, 1);
                localStorage.setItem('hubsNetwork', JSON.stringify(hubs));
                renderHubList();
            }
        };

        renderHubList();
    })();
</script>
