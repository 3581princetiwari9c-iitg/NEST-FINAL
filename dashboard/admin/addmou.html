<div class="flex flex-col gap-[32px] items-start w-full max-w-[1100px] mx-auto pb-10">
    <!-- Top Navigation & Header -->
    <div class="flex flex-col gap-[12px] w-full">
        <a href="#hubmou"
            class="flex items-center gap-2 text-[#677461] hover:text-[#1b3a28] transition-all font-['Inter'] font-semibold text-[14px] group">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="group-hover:-translate-x-1 transition-transform">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Hub & MOU
        </a>
        <div class="flex items-center justify-between w-full">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Add New MOU Association
            </h1>
            <button id="submit-mou-btn"
                class="bg-[#2D5A3D] text-white px-8 py-3 rounded-[8px] font-['Manrope'] font-bold text-[15px] shadow-sm hover:bg-[#1b3a28] transition-all">
                Submit MOU
            </button>
        </div>
    </div>

    <!-- Consolidated Section: MOU Identity & Records -->
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_2fr] gap-[48px] w-full">
        <!-- Left Column: Info -->
        <div class="flex flex-col gap-[12px]">
            <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">
                MOU Identity & Records
            </h2>
            <p class="font-['Inter'] text-[#677461] text-[14px] leading-relaxed max-w-[280px]">
                Define the primary identity and upload the official documentation for this association.
            </p>
        </div>

        <!-- Right Column: Unified Form Card -->
        <div class="bg-white rounded-[16px] shadow-[0px_8px_24px_rgba(0,0,0,0.04)] border border-gray-100 p-[32px] w-full">
            <form class="flex flex-col gap-[24px]">
                <!-- Institution Name -->
                <div class="flex flex-col gap-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Institution / Industry Name</label>
                    <input type="text" placeholder="e.g. Indian Institute of Technology, Guwahati"
                        class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] outline-none transition-all">
                </div>

                <!-- Tagline / Subtitle -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Objective Tagline</label>
                        <span class="text-[10px] font-bold text-red-500 uppercase">Max 5 Words</span>
                    </div>
                    <input type="text" placeholder="e.g. Research and ecosystem coordination"
                        class="w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] outline-none transition-all">
                </div>

                <!-- Association Type (Government, Body, Institution) -->
                <div class="flex flex-col gap-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Association Type</label>
                    <div class="relative">
                        <select class="appearance-none w-full bg-[#f3f4f6]/50 border border-gray-100 rounded-[8px] px-[16px] py-[14px] font-['Inter'] text-[#1b3a28] focus:ring-2 focus:ring-[#2D5A3D]/10 focus:border-[#2D5A3D] outline-none transition-all cursor-pointer">
                            <option value="" disabled selected>Select Type</option>
                            <option value="government">Government</option>
                            <option value="body">Body</option>
                            <option value="institution">Institution</option>
                        </select>
                        <div class="absolute right-[16px] top-1/2 -translate-y-1/2 pointer-events-none text-[#677461]">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                </div>

                <!-- Integrated Upload -->
                <div class="flex flex-col gap-2 pt-2">
                    <label class="font-['Inter'] font-bold text-[#464E42] text-[12px] uppercase tracking-wider">Upload MOU Document (PDF)</label>
                    <div class="w-full border-2 border-dashed border-gray-200 rounded-[12px] p-[24px] flex flex-col items-center justify-center gap-2 hover:border-[#2D5A3D] hover:bg-[#f1ffee]/30 transition-all cursor-pointer group relative">
                        <input type="file" accept=".pdf" class="absolute inset-0 opacity-0 cursor-pointer">
                        <div class="w-[40px] h-[40px] bg-white rounded-full shadow-sm flex items-center justify-center text-[#2D5A3D] group-hover:scale-110 transition-transform">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                        </div>
                        <span class="font-['Inter'] font-semibold text-[#1b3a28] text-[13px]">Upload or drag and drop</span>
                        <span class="font-['Inter'] text-[#677461] text-[11px]">PDF only (Max 25MB)</span>
                    </div>
                </div>

                <div class="mt-4 pt-6 border-t border-gray-100">
                    <button type="submit" class="w-full bg-[#1b3a28] hover:bg-[#2d5a3d] text-white font-['Manrope'] font-bold py-[16px] rounded-[12px] shadow-lg transition-all transform hover:scale-[1.005] active:scale-[0.995] text-[16px] tracking-wider uppercase">
                        Upload & Submit MOU
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
