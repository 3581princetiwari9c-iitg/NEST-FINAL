<div class="flex flex-col gap-[24px] items-start w-full">
  <!-- Header -->
  <div class="flex flex-col items-start shrink-0">
    <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
      Notification Bar Management
    </h1>

  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 w-full max-w-6xl">
    <!-- Configuration Form (Add New) -->
    <div class="flex flex-col gap-6">
      <div class="bg-white p-[24px] rounded-[12px] shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col gap-[20px]">
        <div class="flex items-center gap-2 mb-2">
          <div class="bg-[#1b3a28] h-[18px] rounded-[9999px] w-[4px]"></div>
          <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">Add New Notification</h2>
        </div>

        <div class="flex flex-col gap-4">
          <!-- Notification Text -->
          <div class="flex flex-col gap-2">
            <label class="font-['Inter'] font-semibold text-[#464e42] text-[13px] uppercase tracking-wide">Announcement Text</label>
            <textarea id="notif-text" rows="2" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#1b3a28]/20 focus:border-[#1b3a28] transition-all text-sm" placeholder="Ex: NEST Cluster Progress Report 2025-26 is now live!"></textarea>
          </div>

          <!-- PDF Upload -->
          <div class="flex flex-col gap-2">
            <label class="font-['Inter'] font-semibold text-[#464e42] text-[13px] uppercase tracking-wide">Link (Optional PDF)</label>
            <div id="dropzone" class="relative group border-2 border-dashed border-gray-200 hover:border-[#2D5A3D] rounded-[12px] p-4 flex flex-col items-center justify-center transition-all bg-[#f9fafb] cursor-pointer">
              <input id="notif-pdf-file" type="file" accept="application/pdf" class="absolute inset-0 opacity-0 cursor-pointer">
              <div id="upload-icon-container" class="w-10 h-10 bg-white text-[#2D5A3D] rounded-full flex items-center justify-center mb-1 shadow-sm transition-all group-hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="17 8 12 3 7 8"></polyline>
                  <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
              </div>
              <p id="file-name-display" class="font-['Inter'] font-semibold text-[#1b3a28] text-[12px]">Drop PDF or click</p>
            </div>
          </div>

          <button id="add-notif" class="mt-4 w-full bg-[#2d5a3d] text-white font-['Inter'] font-bold py-3 rounded-lg hover:bg-[#1b3a28] transition-all shadow-md flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <span>Add to Live List</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Active Notifications List -->
    <div class="flex flex-col gap-6">
      <div class="bg-white p-[24px] rounded-[12px] shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col gap-[20px] min-h-[400px]">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <div class="bg-[#2D5A3D] h-[18px] rounded-[9999px] w-[4px]"></div>
            <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">Active Queue</h2>
          </div>
          <span id="notif-count" class="bg-[#f1f5f1] text-[#2D5A3D] text-[12px] font-bold px-2.5 py-1 rounded-full border border-[#e4eee4]">0 Notifications</span>
        </div>

        <div id="notif-list" class="flex flex-col gap-3">
          <!-- Items will be injected here -->
          <div class="flex items-center justify-center py-20 text-gray-400 italic text-sm font-['Inter']">
            No active notifications. Add one to get started.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const textInput = document.getElementById('notif-text');
    const fileInput = document.getElementById('notif-pdf-file');
    const fileNameDisplay = document.getElementById('file-name-display');
    const addBtn = document.getElementById('add-notif');
    const dropzone = document.getElementById('dropzone');
    const notifList = document.getElementById('notif-list');
    const notifCount = document.getElementById('notif-count');

    let currentPdfData = null;
    let currentPdfFile = null;
    let notifications = [];

    function supabaseClient() {
      return window.NESTSupabase && window.NESTSupabase.client;
    }

    function withTimeout(promise, label, timeoutMs = 15000) {
      return Promise.race([
        promise,
        new Promise((_, reject) => {
          setTimeout(() => reject(new Error(`${label} took too long. Please check your internet connection and try again.`)), timeoutMs);
        })
      ]);
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[char]));
    }

    function publicNotificationPayload(list) {
      return list.map((item) => ({
        text: item.text || item.title || '',
        pdfUrl: item.pdf_url || item.pdfUrl || ''
      }));
    }

    async function syncPublicNotificationBar() {
      localStorage.setItem('nest_notification_config', JSON.stringify(publicNotificationPayload(notifications)));
      try {
        if (window.NESTSupabaseApp && typeof window.NESTSupabaseApp.refreshNotifications === 'function') {
          await withTimeout(window.NESTSupabaseApp.refreshNotifications(), 'Notification refresh', 8000);
          return;
        }
        if (typeof window.renderNotificationBar === 'function') window.renderNotificationBar();
      } catch (error) {
        console.warn('Notification bar refresh skipped:', error);
      }
    }

    async function loadNotifications() {
      const client = supabaseClient();
      if (!client) {
        notifications = [];
        renderList();
        return;
      }
      const { data, error } = await withTimeout(
        client
          .from('notifications')
          .select('*')
          .eq('is_active', true)
          .order('sort_order', { ascending: true })
          .order('created_at', { ascending: false }),
        'Loading notifications'
      );
      if (error) {
        console.error(error);
        alert(error.message || 'Unable to load notifications.');
        notifications = [];
      } else {
        notifications = data || [];
      }
      renderList();
      syncPublicNotificationBar();
    }

    async function uploadNotificationPdf() {
      if (!currentPdfFile) return null;
      if (window.NESTSupabase && typeof window.NESTSupabase.uploadFile === 'function') {
        return withTimeout(window.NESTSupabase.uploadFile(currentPdfFile, 'notifications'), 'PDF upload', 25000);
      }
      throw new Error('Supabase file upload is not available.');
    }

    async function insertNotification(payload) {
      const client = supabaseClient();
      const response = await withTimeout(
        client
          .from('notifications')
          .insert(payload)
          .select()
          .single(),
        'Saving notification'
      );
      if (
        response.error &&
        String(response.error.message || response.error.details || '').toLowerCase().includes('title')
      ) {
        const fallbackPayload = { ...payload };
        delete fallbackPayload.title;
        return withTimeout(
          client
            .from('notifications')
            .insert(fallbackPayload)
            .select()
            .single(),
          'Saving notification'
        );
      }
      return response;
    }

    function renderList() {
      notifCount.innerText = `${notifications.length} Notification${notifications.length !== 1 ? 's' : ''}`;
      
      if (notifications.length === 0) {
        notifList.innerHTML = `
          <div class="flex items-center justify-center py-20 text-gray-400 italic text-sm font-['Inter']">
            No active notifications. Add one to get started.
          </div>
        `;
        return;
      }

      notifList.innerHTML = notifications.map((notif, index) => `
        <div class="group flex items-start gap-3 p-4 bg-[#f9fafb] hover:bg-white border border-gray-100 hover:border-[#2D5A3D]/30 rounded-xl transition-all shadow-sm">
          <div class="flex-grow flex flex-col gap-1">
            <p class="font-['Inter'] text-[#1b3a28] text-sm font-medium line-clamp-2">${escapeHtml(notif.text || notif.title || '')}</p>
            ${(notif.pdf_url || notif.pdfUrl) ? `
              <div class="flex items-center gap-1.5 text-[11px] text-[#2D5A3D] font-semibold bg-[#f0f9f1] w-fit px-2 py-0.5 rounded border border-[#dcfce7]">
                <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                PDF Attached
              </div>
            ` : ''}
          </div>
          <button onclick="deleteNotification(${index})" class="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Delete Announcement">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          </button>
        </div>
      `).join('');
    }

    window.deleteNotification = function(index) {
      if (confirm('Are you sure you want to remove this announcement?')) {
        const item = notifications[index];
        const client = supabaseClient();
        if (!client || !item || !item.id) return;
        client
          .from('notifications')
          .delete()
          .eq('id', item.id)
          .then(async ({ error }) => {
            if (error) {
              alert(error.message || 'Unable to delete notification.');
              return;
            }
            notifications.splice(index, 1);
            renderList();
            syncPublicNotificationBar();
          });
      }
    };

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          alert("File is too large! Please select a PDF smaller than 5MB.");
          fileInput.value = '';
          return;
        }
        fileNameDisplay.innerText = file.name;
        currentPdfFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
          currentPdfData = event.target.result;
          dropzone.classList.add('border-[#2D5A3D]', 'bg-[#f1ffee]/30');
        };
        reader.readAsDataURL(file);
      }
    });

    addBtn.addEventListener('click', async () => {
      const text = textInput.value.trim();
      if (!text) {
        alert('Please enter announcement text.');
        return;
      }

      const client = supabaseClient();
      if (!client) {
        alert('Supabase is not available. Please reload and try again.');
        return;
      }

      addBtn.disabled = true;
      addBtn.innerText = 'Saving...';

      try {
        const pdfUrl = await uploadNotificationPdf();
        const { data, error } = await insertNotification({
          title: text,
          text,
          pdf_url: pdfUrl,
          is_active: true,
          sort_order: 0
        });
        if (error) throw error;

        notifications.unshift(data);
        renderList();
        syncPublicNotificationBar();

        textInput.value = '';
        currentPdfData = null;
        currentPdfFile = null;
        fileInput.value = '';
        fileNameDisplay.innerText = 'Drop PDF or click';
        dropzone.classList.remove('border-[#2D5A3D]', 'bg-[#f1ffee]/30');

        addBtn.innerText = "Announcement Added!";
        addBtn.classList.remove('bg-[#2d5a3d]');
        addBtn.classList.add('bg-green-600');
        setTimeout(() => {
          addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span>Add to Live List</span>`;
          addBtn.classList.add('bg-[#2d5a3d]');
          addBtn.classList.remove('bg-green-600');
          addBtn.disabled = false;
        }, 1500);
      } catch (error) {
        console.error(error);
        alert(error.message || 'Unable to save notification.');
        addBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg><span>Add to Live List</span>`;
        addBtn.disabled = false;
      }
    });

    loadNotifications().catch((error) => {
      console.error(error);
      alert(error.message || 'Unable to load notifications.');
    });
  })();
</script>
