<div class="flex flex-col gap-[24px] items-start w-full">
  <!-- Header -->
  <div class="flex flex-col items-start shrink-0">
    <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
      Notification Bar Management
    </h1>
  </div>

  <div class="w-full max-w-3xl">
    <!-- Configuration Form -->
    <div class="bg-white p-[24px] rounded-[12px] shadow-[0px_4px_12px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col gap-[20px]">
      <div class="flex items-center gap-2 mb-2">
        <div class="bg-[#1b3a28] h-[18px] rounded-[9999px] w-[4px]"></div>
        <h2 class="font-['Manrope'] font-bold text-[#1b3a28] text-[18px]">Edit Notification</h2>
      </div>

      <div class="flex flex-col gap-4">
        <!-- Notification Text -->
        <div class="flex flex-col gap-2">
          <label class="font-['Inter'] font-semibold text-[#464e42] text-[13px] uppercase tracking-wide">Announcement Text</label>
          <textarea id="notif-text" rows="2" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-[#1b3a28]/20 focus:border-[#1b3a28] transition-all text-sm" placeholder="Ex: NEST Cluster Progress Report 2025-26 is now live!"></textarea>
        </div>

        <!-- PDF Upload -->
        <div class="flex flex-col gap-2">
          <label class="font-['Inter'] font-semibold text-[#464e42] text-[13px] uppercase tracking-wide">Upload (PDF)</label>
          <div id="dropzone" class="relative group border-2 border-dashed border-gray-200 hover:border-[#2D5A3D] rounded-[12px] p-6 flex flex-col items-center justify-center transition-all bg-[#f9fafb] cursor-pointer">
            <input id="notif-pdf-file" type="file" accept="application/pdf" class="absolute inset-0 opacity-0 cursor-pointer">
            <div id="upload-icon-container" class="w-12 h-12 bg-white text-[#2D5A3D] rounded-full flex items-center justify-center mb-2 shadow-sm transition-all group-hover:scale-110">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <p id="file-name-display" class="font-['Inter'] font-semibold text-[#1b3a28] text-[13px]">Click to upload or drag & drop</p>
            <p id="file-size-display" class="font-['Inter'] text-[#677461] text-[11px]">PDF only (Max 5MB)</p>
          </div>
        </div>

        <button id="save-notif" class="mt-4 w-full bg-[#2d5a3d] text-white font-['Inter'] font-bold py-3 rounded-lg hover:bg-[#1b3a28] transition-all shadow-md flex items-center justify-center gap-2">
          <svg id="save-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          <span id="save-text">Save Notification Details</span>
        </button>
      </div>
    </div>


</div>

<script>
  (function() {
    const textInput = document.getElementById('notif-text');
    const fileInput = document.getElementById('notif-pdf-file');
    const fileNameDisplay = document.getElementById('file-name-display');
    const saveBtn = document.getElementById('save-notif');
    const dropzone = document.getElementById('dropzone');

    let currentPdfData = null;

    // Default configuration
    const DEFAULTS = {
      text: "NEST Cluster Progress Report 2025-26 is now live!",
      pdfUrl: "/assets/docs/NEST_Report_2026.pdf"
    };

    // Load existing data
    const savedData = JSON.parse(localStorage.getItem('nest_notification_config') || JSON.stringify(DEFAULTS));
    textInput.value = savedData.text;
    currentPdfData = savedData.pdfUrl;

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (file.size > 5 * 1024 * 1024) {
          alert("File is too large! Please select a PDF smaller than 5MB.");
          fileInput.value = '';
          return;
        }

        fileNameDisplay.innerText = file.name;
        document.getElementById('file-size-display').innerText = formatBytes(file.size);

        const reader = new FileReader();
        reader.onload = (event) => {
          currentPdfData = event.target.result;
          dropzone.classList.add('border-[#2D5A3D]', 'bg-[#f1ffee]/30');
        };
        reader.readAsDataURL(file);
      }
    });

    saveBtn.addEventListener('click', () => {
      const config = {
        text: textInput.value.trim() || DEFAULTS.text,
        pdfUrl: currentPdfData || DEFAULTS.pdfUrl
      };

      localStorage.setItem('nest_notification_config', JSON.stringify(config));

      // Success feedback
      const originalText = document.getElementById('save-text').innerText;
      document.getElementById('save-text').innerText = "Changes Saved!";
      saveBtn.classList.remove('bg-[#2d5a3d]');
      saveBtn.classList.add('bg-green-600');

      setTimeout(() => {
        document.getElementById('save-text').innerText = originalText;
        saveBtn.classList.add('bg-[#2d5a3d]');
        saveBtn.classList.remove('bg-green-600');
      }, 2000);
    });
  })();
</script>
