<div class="flex flex-col gap-[24px] items-start w-full pb-10">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 w-full mb-[8px]">
        <div class="flex flex-col items-start shrink-0">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Management Team
            </h1>
        </div>
        <button id="add-staff-member-button" onclick="toggleAddMemberModal()"
            class="flex items-center gap-2 bg-[#2D5A3D] text-white px-6 py-2.5 rounded-[8px] font-['Manrope'] font-bold text-[14px] shadow-sm hover:bg-[#1b3a28] transition-all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add Staff Member
        </button>
    </div>

    <!-- Summary Overview (Grid matched to clusterdashboard.html) -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-[16px] w-full max-w-[1000px]">
        <!-- Total Staff -->
        <div
            class="bg-white p-[18px] rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col gap-[16px]">
            <div class="w-[36px] h-[38px] bg-[#EEF2FF] rounded-[6px] flex items-center justify-center text-[#6366F1]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <span class="font-['Inter'] font-semibold text-[#464e42] text-[11px] uppercase tracking-wider">Total
                    Staff</span>
                <span class="font-['Manrope'] font-bold text-[#00346f] text-[24px] leading-[normal]">0</span>
            </div>
        </div>
        <!-- Administrators -->
        <div
            class="bg-white p-[18px] rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col gap-[16px]">
            <div class="w-[36px] h-[38px] bg-[#ECFEFF] rounded-[6px] flex items-center justify-center text-[#0891B2]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <span
                    class="font-['Inter'] font-semibold text-[#464e42] text-[11px] uppercase tracking-wider">Administrators</span>
                <span class="font-['Manrope'] font-bold text-[#00346f] text-[24px] leading-[normal]">0</span>
            </div>
        </div>
        <!-- Managers -->
        <div
            class="bg-white p-[18px] rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col gap-[16px]">
            <div class="w-[36px] h-[38px] bg-[#F0FDF4] rounded-[6px] flex items-center justify-center text-[#16A34A]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20v-6"></path>
                    <path d="M6 20V10"></path>
                    <path d="M18 20V4"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <span
                    class="font-['Inter'] font-semibold text-[#464e42] text-[11px] uppercase tracking-wider">Managers</span>
                <span class="font-['Manrope'] font-bold text-[#00346f] text-[24px] leading-[normal]">0</span>
            </div>
        </div>
        <!-- Employees -->
        <div
            class="bg-white p-[18px] rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col gap-[16px]">
            <div class="w-[36px] h-[38px] bg-[#FFF7ED] rounded-[6px] flex items-center justify-center text-[#EA580C]">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="8.5" cy="7" r="4"></circle>
                    <polyline points="17 11 19 13 23 9"></polyline>
                </svg>
            </div>
            <div class="flex flex-col">
                <span
                    class="font-['Inter'] font-semibold text-[#464e42] text-[11px] uppercase tracking-wider">Employees</span>
                <span class="font-['Manrope'] font-bold text-[#00346f] text-[24px] leading-[normal]">0</span>
            </div>
        </div>
    </div>

    <!-- Team Table Section -->
    <div class="w-full bg-white rounded-[16px] border border-[#e5e7ea] shadow-sm overflow-hidden mt-2">
        <div class="px-8 py-5 border-b border-[#f1f2f4] bg-[#fdfdfd] flex items-center justify-between">
            <h2 class="font-['Manrope'] font-bold text-[18px] text-[#1b3a28]">Management Overview</h2>
            <div class="relative">
                <input type="search" data-management-search name="management_staff_search" value=""
                    autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Search staff members..."
                    class="pl-10 pr-4 py-2 bg-gray-50 border border-gray-100 rounded-lg text-[14px] outline-none focus:border-[#2D5A3D] transition-all font-['Manrope'] w-[280px]">
                <svg class="absolute left-3 top-2.5 text-gray-400" width="18" height="18" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
        <div class="overflow-x-auto w-full">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-[#f9fafb]/80">
                        <th
                            class="px-8 py-4 font-['Manrope'] font-bold text-[13px] text-[#677461] uppercase tracking-wider">
                            Member Name</th>
                        <th
                            class="px-8 py-4 font-['Manrope'] font-bold text-[13px] text-[#677461] uppercase tracking-wider">
                            Email Address</th>
                        <th
                            class="px-8 py-4 font-['Manrope'] font-bold text-[13px] text-[#677461] uppercase tracking-wider">
                            Staff Role</th>
                        <th
                            class="px-8 py-4 font-['Manrope'] font-bold text-[13px] text-[#677461] uppercase tracking-wider">
                            Added Date</th>
                        <th
                            class="px-8 py-4 font-['Manrope'] font-bold text-[13px] text-[#677461] uppercase tracking-wider text-right">
                            Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <!-- Add Member Modal -->
    <div id="add-member-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleAddMemberModal()"></div>
        <div
            class="relative bg-white rounded-[24px] shadow-2xl w-full max-w-[500px] mx-4 overflow-hidden transform translate-y-[24px] transition-all">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="font-['Manrope'] font-bold text-[22px] text-[#1b3a28]">Add Staff Member</h3>
                    <button onclick="toggleAddMemberModal()" class="text-gray-400 hover:text-red-500 transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="space-y-6">
                    <div class="grid grid-cols-1 gap-4">
                        <div class="space-y-2">
                            <label
                                class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Full Name</label>
                            <input id="staff-name" type="text" placeholder="Engr. John Doe"
                                class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                        </div>
                        <div class="space-y-2">
                            <label
                                class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Email
                                ID</label>
                            <input id="staff-email" type="email" placeholder="john@nestcluster.net"
                                autocomplete="new-email"
                                class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                        </div>
                        <div class="space-y-2">
                            <label
                                class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Password</label>
                            <input id="staff-password" type="password" placeholder="Minimum 8 characters"
                                class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label
                                    class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Access
                                    Role</label>
                                <select id="staff-role"
                                    class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                                    <option value="employee">Employee</option>
                                    <option value="manager">Manager</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Designation</label>
                                <input id="staff-designation" type="text" placeholder="Project Lead"
                                    class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                            </div>
                        </div>
                    </div>

                    <button type="button" data-action="save-staff-member"
                        class="w-full bg-[#2D5A3D] text-white py-4 rounded-[12px] font-['Manrope'] font-bold text-[16px] shadow-lg hover:shadow-xl hover:bg-[#1b3a28] transition-all mt-4">
                        Create Staff Login
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Member Modal -->
    <div id="edit-member-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleEditMemberModal()"></div>
        <div
            class="relative bg-white rounded-[24px] shadow-2xl w-full max-w-[500px] mx-4 overflow-hidden transform translate-y-[24px] transition-all">
            <div class="p-8">
                <div class="flex items-center justify-between mb-8">
                    <h3 class="font-['Manrope'] font-bold text-[22px] text-[#1b3a28]">Edit Staff Member</h3>
                    <button onclick="toggleEditMemberModal()"
                        class="text-gray-400 hover:text-red-500 transition-colors">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="space-y-6">
                    <div class="grid grid-cols-1 gap-4">
                        <div class="space-y-2">
                            <label
                                class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">FullName</label>
                            <input type="text" id="edit-name"
                                class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                        </div>
                        <div class="space-y-2">
                            <label
                                class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Email
                                ID</label>
                            <input type="email" id="edit-email"
                                class="w-full px-4 py-3 bg-gray-50 border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all"
                                disabled>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label
                                    class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Access
                                    Role</label>
                                <select id="edit-role"
                                    class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                                    <option value="employee">Employee</option>
                                    <option value="manager">Manager</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="space-y-2">
                                <label
                                    class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Designation</label>
                                <input type="text" id="edit-designation"
                                    class="w-full px-4 py-3 bg-[#fdfdfd] border border-[#e5e7ea] rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all">
                            </div>
                        </div>
                    </div>

                    <button onclick="simulateAction('Updating...')"
                        class="w-full bg-[#2D5A3D] text-white py-4 rounded-[12px] font-['Manrope'] font-bold text-[16px] shadow-lg hover:shadow-xl hover:bg-[#1b3a28] transition-all mt-4">
                        Update Member Details
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleAddMemberModal() {
        const modal = document.getElementById('add-member-modal');
        modal.classList.toggle('hidden');
    }

    function toggleEditMemberModal(name, email, designation, role) {
        const modal = document.getElementById('edit-member-modal');
        if (name) {
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-email').value = email;
            document.getElementById('edit-designation').value = designation;
            document.getElementById('edit-role').value = role;
        }
        modal.classList.toggle('hidden');
    }

    function simulateDelete(btn) {
        if (confirm('CRITICAL: Remove team member? This will revoke all digital access immediately.')) {
            const row = btn.closest('tr');
            row.style.opacity = '0';
            row.style.transform = 'translateX(20px)';
            row.style.transition = 'all 0.4s ease';
            setTimeout(() => { row.remove(); alert('Removed successfully.'); }, 400);
        }
    }

    function simulateAction(msg) {
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = msg;
        btn.disabled = true;
        setTimeout(() => {
            alert('Action successful! (Backend Simulation)');
            btn.parentElement.parentElement.parentElement.parentElement.classList.add('hidden'); // Close modal
            btn.innerText = originalText;
            btn.disabled = false;
        }, 1200);
    }
</script>
