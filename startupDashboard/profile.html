<div class="flex flex-col gap-[24px] items-start w-full pb-10">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 w-full mb-[8px]">
        <div class="flex flex-col items-start shrink-0">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Entrepreneur Profile
            </h1>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleEditMode(true)" id="edit-btn" class="flex items-center gap-2 bg-white text-[#2D5A3D] border-2 border-[#2D5A3D] px-8 py-2.5 rounded-[8px] font-['Manrope'] font-bold text-[14px] shadow-sm hover:bg-[#f1ffee] transition-all">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                Edit Profile
            </button>
            <button onclick="simulateSaveProfile()" id="save-btn" class="hidden flex items-center gap-2 bg-[#2D5A3D] text-white px-8 py-2.5 rounded-[8px] font-['Manrope'] font-bold text-[14px] shadow-sm hover:bg-[#1b3a28] transition-all">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Save All Changes
            </button>
        </div>
    </div>

    <!-- Profile Overview Card -->
    <div class="w-full bg-white rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 p-8 flex flex-col md:flex-row items-center gap-8">
        <div class="relative group">
            <div class="w-32 h-32 rounded-full border-4 border-gray-50 overflow-hidden shadow-md">
                <img id="user-avatar" src="https://ui-avatars.com/api/?name=Entrepreneur+User&background=2D5A3D&color=fff&size=512" alt="Profile" class="w-full h-full object-cover">
            </div>
            <button onclick="simulateAvatarChange()" class="absolute bottom-0 right-0 p-2.5 bg-[#2D5A3D] text-white rounded-full shadow-lg hover:scale-110 transition-all border-2 border-white">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
        </div>
        <div class="flex flex-col items-center md:items-start gap-1">
            <h2 class="font-['Manrope'] font-bold text-[24px] text-[#1b3a28]">Entrepreneur Name</h2>
          <span class="py-2 text-[#464E42] rounded-full text-[12px] font-bold uppercase tracking-wider bordermb-2">Entrepreneur</span>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-[24px] w-full mt-4">
        <!-- Section 1: Identity -->
        <div class="bg-white rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden">
            <div class="px-8 py-5 border-b border-[#f1f2f4] bg-[#fdfdfd]">
                <h3 class="font-['Manrope'] font-bold text-[18px] text-[#1b3a28]">Account Identity</h3>
            </div>
            <div class="p-8 space-y-6">
                <div class="space-y-4">
                    <div class="space-y-2">
                        <label class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Startup Name</label>
                        <input type="text" value="NEST Venture Alpha" disabled class="profile-input w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all text-gray-500 cursor-not-allowed">
                    </div>
                    <div class="space-y-2">
                        <label class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Email Address</label>
                        <input type="email" value="founder@nestventure.com" disabled class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-[10px] text-gray-500 font-['Manrope'] cursor-not-allowed">
                    </div>
                    <div class="space-y-2">
                        <label class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Phone Number</label>
                        <input type="text" value="+91 99887 76655" disabled class="profile-input w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all text-gray-500 cursor-not-allowed">
                    </div>
                </div>
            </div>
        </div>

        <!-- Section 2: Security -->
        <div class="bg-white rounded-[10px] shadow-[0px_1px_2px_0px_rgba(0,0,0,0.05)] border border-gray-100 overflow-hidden">
            <div class="px-8 py-5 border-b border-[#f1f2f4] bg-[#fdfdfd]">
                <h3 class="font-['Manrope'] font-bold text-[18px] text-[#1b3a28]">Security & Credentials</h3>
            </div>
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-1 gap-4">
                    <div class="space-y-2">
                        <label class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">Current Password</label>
                        <input type="password" placeholder="••••••••" disabled class="profile-input w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all text-gray-500 cursor-not-allowed">
                    </div>
                    <div class="space-y-2">
                        <label class="block font-['Manrope'] font-bold text-[13px] text-[#1b3a28] uppercase tracking-wider">New Password</label>
                        <input type="password" placeholder="••••••••" disabled class="profile-input w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-[10px] outline-none focus:border-[#2D5A3D] font-['Manrope'] transition-all text-gray-500 cursor-not-allowed">
                    </div>
                </div>
                <button id="update-pass-btn" disabled class="w-full px-8 py-3 bg-gray-50 text-gray-400 font-['Manrope'] font-bold rounded-[8px] border border-gray-200 cursor-not-allowed transition-all text-[14px]">Update Password</button>
            </div>
        </div>
    </div>
</div>

<!-- OTP Verification Modal (Retained from Artisan) -->
<div id="otp-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden animate-in fade-in duration-200">
    <div class="bg-white rounded-[16px] shadow-2xl border border-gray-100 max-w-md w-full overflow-hidden">
        <div class="p-8 text-center">
            <div class="w-16 h-16 bg-[#f1ffee] text-[#2D5A3D] rounded-full flex items-center justify-center mx-auto mb-6">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h3 class="font-['Manrope'] font-bold text-[22px] text-[#1b3a28] mb-2">Confirm Profile Update</h3>
            <p class="font-['Manrope'] text-[#677461] text-[15px] mb-8">Enter the 6-digit verification code sent to your registered email.</p>

            <div class="flex justify-between gap-2 mb-8" id="otp-inputs">
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
                <input type="text" maxlength="1" class="w-12 h-14 bg-gray-50 border-2 border-gray-100 rounded-xl text-center font-bold text-xl focus:border-[#2D5A3D] outline-none transition-all" />
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="verifyOTP()" class="w-full py-4 bg-[#2D5A3D] text-white font-['Manrope'] font-bold rounded-xl shadow-lg hover:bg-[#1b3a28] transition-all">Verify & Commit Changes</button>
                <button onclick="closeOTPModal()" class="w-full py-3 text-[#677461] font-['Manrope'] font-bold">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleEditMode(enable) {
        const editBtn = document.getElementById('edit-btn');
        const saveBtn = document.getElementById('save-btn');
        const inputs = document.querySelectorAll('.profile-input');
        const updatePassBtn = document.getElementById('update-pass-btn');

        if (enable) {
            editBtn.classList.add('hidden');
            saveBtn.classList.remove('hidden');
            inputs.forEach(input => {
                input.disabled = false;
                input.classList.remove('bg-gray-50', 'text-gray-500', 'cursor-not-allowed');
                input.classList.add('bg-[#fdfdfd]');
            });
            updatePassBtn.disabled = false;
            updatePassBtn.classList.remove('bg-gray-50', 'text-gray-400', 'cursor-not-allowed');
            updatePassBtn.classList.add('bg-[#2D5A3D]', 'text-white', 'hover:bg-[#1b3a28]');
        } else {
            editBtn.classList.remove('hidden');
            saveBtn.classList.add('hidden');
            inputs.forEach(input => {
                input.disabled = true;
                input.classList.remove('bg-[#fdfdfd]');
                input.classList.add('bg-gray-50', 'text-gray-500', 'cursor-not-allowed');
            });
            updatePassBtn.disabled = true;
            updatePassBtn.classList.remove('bg-[#2D5A3D]', 'text-white', 'hover:bg-[#1b3a28]');
            updatePassBtn.classList.add('bg-gray-50', 'text-gray-400', 'cursor-not-allowed');
        }
    }

    function simulateSaveProfile() {
        const btn = document.getElementById('save-btn');
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<span class="flex items-center gap-2">Requesting Access...</span>';
        btn.disabled = true;

        setTimeout(() => {
            document.getElementById('otp-modal').classList.remove('hidden');
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }, 800);
    }

    function verifyOTP() {
        alert('Entrepreneur profile successfully updated!');
        closeOTPModal();
        toggleEditMode(false);
    }

    function closeOTPModal() {
        document.getElementById('otp-modal').classList.add('hidden');
    }

    function simulateAvatarChange() {
        alert('Profile picture update triggered.');
    }

    // OTP Navigation
    const otpInputs = document.querySelectorAll('#otp-inputs input');
    otpInputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length > 0 && index < otpInputs.length - 1) {
                otpInputs[index + 1].focus();
            }
        });
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                otpInputs[index - 1].focus();
            }
        });
    });
</script>
