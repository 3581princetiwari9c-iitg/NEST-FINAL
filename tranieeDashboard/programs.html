<div class="flex flex-col gap-[16px] items-start w-full pb-10">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 w-full mb-[8px]">
        <div class="flex flex-col items-start shrink-0">
            <h1 class="font-['Cormorant_Garamond'] font-bold text-[#1b3a28] text-[36px] leading-[normal]">
                Program
            </h1>
        </div>
    </div>

    <!-- PAGE HEADER CATEGORIES -->
    <div class="w-full relative z-10 w-full max-w-[1073px]">
        <!-- TABS -->
        <div class="flex gap-[16px] items-center overflow-x-auto w-full md:w-auto scrollbar-hide border-b border-[#e5e7ea]">
            <button onclick="filterPrograms('upcoming')" id="tab-upcoming"
                class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
                <div class="flex gap-[14px] items-center justify-center relative shrink-0 pb-4 pt-2">
                    <svg class="w-5 h-5 text-[#2d5a3d] js-tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <div class="flex gap-[12px] items-center justify-center relative shrink-0">
                        <span class="font-['Inter'] font-semibold text-[#2d5a3d] text-[16px] js-tab-text">Upcoming</span>
                        <span class="bg-[#f1ffee] text-[#2d5a3d] font-['Manrope'] font-medium text-[13px] px-[8px] py-[1px] rounded-full js-tab-count">0</span>
                    </div>
                </div>
                <div class="absolute bottom-0 w-full h-[2.5px] bg-[#2d5a3d] js-tab-indicator"></div>
            </button>

            <button onclick="filterPrograms('ongoing')" id="tab-ongoing"
                class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
                <div class="flex gap-[14px] items-center justify-center relative shrink-0 pb-4 pt-2">
                    <svg class="w-5 h-5 text-[#677461] js-tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    <div class="flex gap-[12px] items-center justify-center relative shrink-0">
                        <span class="font-['Inter'] font-normal text-[#677461] text-[16px] js-tab-text">Ongoing</span>
                        <span class="bg-[#f0f2f0] text-[#677461] font-['Manrope'] font-medium text-[13px] px-[8px] py-[1px] rounded-full js-tab-count">0</span>
                    </div>
                </div>
                <div class="absolute bottom-0 w-full h-[2.5px] bg-transparent js-tab-indicator"></div>
            </button>

            <button onclick="filterPrograms('completed')" id="tab-completed"
                class="cursor-pointer flex flex-col gap-[14px] items-center justify-center relative shrink-0 w-[198px]">
                <div class="flex gap-[14px] items-center justify-center relative shrink-0 pb-4 pt-2">
                    <svg class="w-5 h-5 text-[#677461] js-tab-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div class="flex gap-[12px] items-center justify-center relative shrink-0">
                        <span class="font-['Inter'] font-normal text-[#677461] text-[16px] js-tab-text">Completed</span>
                        <span class="bg-[#f0f2f0] text-[#677461] font-['Manrope'] font-medium text-[13px] px-[8px] py-[1px] rounded-full js-tab-count">0</span>
                    </div>
                </div>
                <div class="absolute bottom-0 w-full h-[2.5px] bg-transparent js-tab-indicator"></div>
            </button>
        </div>
    </div>

    <!-- PROGRAM LISTINGS (ALL GREEN COLORS) -->
    <div id="program-list" class="w-full flex flex-col gap-[24px] mt-4">
        <div class="w-full text-center py-16 text-[#677461] font-['Inter']">Loading your registered programs...</div>
    </div>
</div>

<script>
    function filterPrograms(status) {
        const cards = document.querySelectorAll('.program-card');
        const buttons = document.querySelectorAll('[id^="tab-"]');
        
        buttons.forEach(btn => {
            const indicator = btn.querySelector('.js-tab-indicator');
            const text = btn.querySelector('.js-tab-text');
            const icon = btn.querySelector('.js-tab-icon');
            const count = btn.querySelector('.js-tab-count');
            
            if (btn.id === 'tab-' + status) {
                indicator.classList.remove('bg-transparent');
                indicator.classList.add('bg-[#2d5a3d]');
                text.classList.remove('font-normal', 'text-[#677461]');
                text.classList.add('font-semibold', 'text-[#2d5a3d]');
                icon.classList.remove('text-[#677461]');
                icon.classList.add('text-[#2d5a3d]');
                if (count) {
                    count.classList.remove('text-[#677461]', 'bg-[#f0f2f0]');
                    count.classList.add('text-[#2d5a3d]', 'bg-[#f1ffee]');
                }
            } else {
                indicator.classList.add('bg-transparent');
                indicator.classList.remove('bg-[#2d5a3d]');
                text.classList.add('font-normal', 'text-[#677461]');
                text.classList.remove('font-semibold', 'text-[#2d5a3d]');
                icon.classList.add('text-[#677461]');
                icon.classList.remove('text-[#2d5a3d]');
                 if (count) {
                    count.classList.add('text-[#677461]', 'bg-[#f0f2f0]');
                    count.classList.remove('text-[#2d5a3d]', 'bg-[#f1ffee]');
                }
            }
        });

        cards.forEach(card => {
            if (card.classList.contains(status)) {
                card.classList.remove('hidden');
            } else {
                card.classList.add('hidden');
            }
        });
    }
</script>
