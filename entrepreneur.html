<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEST Cluster - Entrepreneur Dashboard</title>
    <link href="src/output.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/logo/logo-1.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700&family=Cormorant+Garamond:wght@700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#F0F7F0] pt-[114px]" data-dashboard-role="entrepreneur">
    <!-- 🌿 Background -->
    <div id="background-layer">
        <!-- ⛰️ Hills -->
        <svg class="svg-hills" viewBox="0 0 1440 320" fill="none" preserveAspectRatio="none"
            xmlns="http://www.w3.org/2000/svg">
            <path
                d="M0 200C120 180 240 100 360 120C480 140 600 80 720 100C840 120 960 60 1080 80C1200 100 1320 140 1440 130V320H0V200Z"
                fill="#2D4A24" fill-opacity="0.1" />
            <path d="M0 240C150 220 300 160 450 175C600 190 750 130 900 148C1050 165 1200 200 1440 185V320H0V240Z"
                fill="#2D4A24" fill-opacity="0.08" />
            <path d="M0 220C180 200 360 240 540 220C720 200 900 235 1080 218C1260 202 1360 222 1440 215V320H0V220Z"
                fill="#4A6741" fill-opacity="0.08" />
        </svg>

        <!-- 🌿 Bamboo -->
        <svg class="svg-bamboo" width="215" height="510" viewBox="0 0 215 510" fill="none"
            xmlns="http://www.w3.org/2000/svg">
            <path d="M95 5V505" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="10" stroke-linecap="round" />
            <path d="M135 45V505" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="8" stroke-linecap="round" />
            <path d="M70 65V505" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="6" stroke-linecap="round" />
            <path d="M170 85V505" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="5" stroke-linecap="round" />
            <path d="M205 125V505" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="4" stroke-linecap="round" />
            <path d="M85 85H105" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="2" />
            <path d="M125 125H145" stroke="#2D4A24" stroke-opacity="0.05" stroke-width="1.5" />
            <path d="M95 85C121.667 65 148.333 48.3333 175 35C155 51.6667 141.667 68.3333 135 85" fill="#2D4A24"
                fill-opacity="0.05" />
            <path d="M135 125C161.667 108.333 188.333 95 215 85C193.667 105 180.333 121.667 175 135" fill="#2D4A24"
                fill-opacity="0.05" />
        </svg>
    </div>

    <!-- 🌐 Content -->
    <div class="relative z-10 flex flex-col min-h-screen">
        <!-- Navbar placeholder -->
        <div id="navbar"></div>

        <div class="flex flex-grow">
            <!-- Sidebar placeholder -->
            <div id="sidebar"></div>

            <!-- Main Content Area -->
            <main class="flex-grow ml-[250px] min-h-[calc(100vh-114px)]">
                <div id="main-content" class="p-8">
                    <!-- Dashboard content injected here -->
                </div>
            </main>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="js/supabase-client.js" defer></script>
    <script src="js/nest-supabase-app.js?v=20260429-startup-docs" defer></script>
    <script src="dashboard/js/entrepreneur-dashboard.js" defer></script>
</body>

</html>
